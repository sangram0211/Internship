<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Battery Report</title><link rel="stylesheet" href="/BatteryInventoryComplete/static/css/style.css"></head><body><div class="container"><h2>Battery Status Report</h2><table><thead><tr><th>Status</th><th>Count</th></tr></thead><tbody>{% for row in report %}<tr><td><span class="status {{ row.status|lower|replace(' ', '-') }}">{{ row.status }}</span></td><td>{{ row.count }}</td></tr>{% endfor %}</tbody></table></div></body></html>
