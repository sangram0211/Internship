<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Dashboard</title><link rel="stylesheet" href="/BatteryInventoryComplete/static/css/style.css"></head><body><div class="container"><h1>Battery Inventory</h1><a href="/add" class="btn">Add Battery</a><a href="/report" class="btn secondary">View Report</a><a href="/logout" class="btn secondary">Logout</a><table><thead><tr><th>ID</th><th>Serial Number</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>{% for battery in batteries %}<tr><td>{{ battery.id }}</td><td>{{ battery.serial_number }}</td><td>{{ battery.type }}</td><td><span class="status {{ battery.status|lower|replace(' ', '-') }}">{{ battery.status }}</span></td><td><a href="/edit/{{ battery.id }}" class="btn small">Edit</a><a href="/delete/{{ battery.id }}" class="btn small danger" onclick="return confirm('Delete this battery?');">Delete</a></td></tr>{% endfor %}</tbody></table></div></body></html>
