<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Edit Battery</title><link rel="stylesheet" href="/BatteryInventoryComplete/static/css/style.css"></head><body><div class="container form-page"><h2>Edit Battery Status</h2><form action="/edit/{{ battery.id }}" method="POST"><label>Serial Number: {{ battery.serial_number }}</label><br><label>Type: {{ battery.type }}</label><br><select name="status" required><option value="Available" {% if battery.status == "Available" %}selected{% endif %}>Available</option><option value="In Use" {% if battery.status == "In Use" %}selected{% endif %}>In Use</option><option value="Charging" {% if battery.status == "Charging" %}selected{% endif %}>Charging</option><option value="Maintenance" {% if battery.status == "Maintenance" %}selected{% endif %}>Maintenance</option></select><button type="submit">Update Battery</button></form></div></body></html>
